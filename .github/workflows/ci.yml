name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-21

      - name: Check formatting
        run: |
          git fetch origin main

          base=$(git merge-base HEAD origin/main 2>/dev/null || echo HEAD~1)

          files=$(git diff --name-only "$base" | grep -E '\.(cpp|h)$' | grep -v '/external/' | grep -v '/build/')

          if [ -z "$files" ]; then
            echo "No C++ source files changed."
            exit 0
          fi

          echo "Checking files:"
          echo "$files"
          echo ""
          echo "$files" | xargs clang-format-21 --dry-run --Werror

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DBUILD_VIEWER=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Verify CLI
        run: ./build/bin/orbit-sim --help

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DBUILD_VIEWER=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Validate system file
        run: ./build/bin/orbit-sim validate --system systems/earth_moon.json

      - name: Run test simulation
        run: ./build/bin/orbit-sim run --system systems/earth_moon.json --steps 100 --dt 3600 --output results/test_out.csv
