name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check changed files formatting
        run: |
          git clang-format --diff HEAD~1 > format.patch
          if [ -s format.patch ]; then
            echo "Formatting violations found:"
            cat format.patch
            exit 1
          fi
          echo "Code is properly formatted."

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Build
        run: make -j

      - name: Verify CLI
        run: ./build/bin/orbit-sim --help

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Build
        run: make -j

      - name: Validate system file
        run: make validate

      - name: Run test simulation
        run: make test
