name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format 21
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21

          sudo apt-get install -y clang-format-21
          sudo ln -sf /usr/bin/clang-format-21 /usr/bin/clang-format

      - name: Check formatting
        run: |
          git fetch origin main

          # Determine base commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base=origin/main
          else
            base=$(git rev-parse HEAD~1 2>/dev/null || echo HEAD)
          fi

          # Get changed C++ files safely
          files=$(git diff --name-only "$base" \
            | grep -E '\.(cpp|h)$' \
            | grep -v '^external/' \
            | grep -v '^build/' || true)

          if [ -z "$files" ]; then
            echo "No C++ source files changed."
            exit 0
          fi

          echo "Checking files:"
          echo "$files"
          echo ""

          # Safe iteration over files
          while IFS= read -r file; do
            clang-format --dry-run --Werror "$file"
          done <<< "$files"

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DBUILD_VIEWER=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Verify CLI
        run: ./build/bin/orbit-sim --help

  test:
      needs: lint
      runs-on: ubuntu-latest
  
      steps:
        - uses: actions/checkout@v4
      
        - name: Install dependencies
          run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      
        - name: Configure CMake
          run: cmake -S . -B build -DBUILD_VIEWER=OFF
      
        - name: Build
          run: cmake --build build --parallel
      
        - name: Validate system file
          run: ./build/bin/orbit-sim validate --system systems/earth_moon.json
      
        - name: Run test simulation
          run: ./build/bin/orbit-sim run --system systems/earth_moon.json --steps 100 --dt 3600 --output results/test_out.csv
      
        - name: Run test suite
          run: ctest --output-on-failure
          working-directory: build
