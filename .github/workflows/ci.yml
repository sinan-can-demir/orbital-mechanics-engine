name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-format-21

      - name: Check changed files formatting
        run: |
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main | grep -E '\.(cpp|h)$' | grep -v '^external/' | grep -v '/build/')
          if [ -z "$CHANGED_FILES" ]; then
            echo "No C++ files changed."
            exit 0
          fi
          echo "$CHANGED_FILES" | xargs clang-format-21 --dry-run --Werror

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Build
        run: make -j

      - name: Verify CLI
        run: ./build/bin/orbit-sim --help

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Build
        run: make -j

      - name: Validate system file
        run: make validate

      - name: Run test simulation
        run: make test
